<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>GPTokens Companion</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="wrap">
      <h1>GPTokens</h1>

    <script src="popup.js"></script>
  </body>
